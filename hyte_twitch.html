<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYTE Twitch Widget</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 400px;   /* Twitch requirement */
      min-height: 300px;  /* Twitch requirement */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* fallback play overlay */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      color: white;
      font-size: 48px;
      cursor: pointer;
      z-index: 2;
      transition: opacity 0.2s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="container">
    
    <div id="overlay">▶</div>

    <iframe
      id="twitch-frame"
      src="https://player.twitch.tv/?channel=lacy&parent=reverie-exe.github.io&muted=true&autoplay=true"
      allow="autoplay; fullscreen"
      allowfullscreen>
    </iframe>

  </div>

  <script>
    const overlay = document.getElementById("overlay");
    const iframe = document.getElementById("twitch-frame");

    // fallback: reload iframe on click to trigger playback
    overlay.addEventListener("click", () => {
      iframe.src = iframe.src; // reload player
      overlay.classList.add("hidden");
    });

    // auto-hide overlay after a few seconds (if autoplay works)
    setTimeout(() => {
      overlay.classList.add("hidden");
    }, 3000);
  </script>
</body>
</html>
